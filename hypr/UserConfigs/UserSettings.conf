# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# User Settings
# This is where you put your own settings as this will not be touched during update 
# if the upgrade.sh is used.

# refer to Hyprland wiki for more info https://wiki.hyprland.org/Configuring/Variables/
# NOTE: some settings are in ~/.config/hypr/UserConfigs/UserDecorAnimations.conf
#
# Look on ~/.config/hypr/configs/SystemSettings.conf to know how to modify this

# FIXED: Changed from 'maximize' to 'fullscreen' using V2 syntax to ensure True Fullscreen
windowrule = fullscreen 0, workspace 2, match:class ^(zen)$

# windowrulev2 = fullscreen, class:^(kitty)$
windowrule = fullscreen on, match:class ^(org.wezfurlong.wezterm)$
windowrule = workspace 3, match:class ^(kitty)$
windowrule = workspace 9, match:class ^(xdm-app)$
# windowrulev2 = workspace 1, class:^(org.wezfurlong.wezterm)$
windowrule = workspace 1, match:class ^(foot)$
windowrule = workspace 4, match:class ^(com.mitchellh.ghostty)$
windowrule = workspace 5, match:class ^(mpv)$
windowrule = workspace 6, match:class ^(org.pwmt.zathura)$
windowrule = workspace 6, match:class ^(chromium)$
windowrule = workspace 7, match:class ^(vimiv)$
windowrule = workspace 7, match:class ^(swayimg)$
windowrule = workspace 8, match:class ^(tixati)$

# FIXED: Removed [float]. Floating windows that are forced into fullscreen often 
# conflict with Wayland layer shells. Let it tile, then fullscreen it.
workspace = 2, on-created-empty:zen-browser

bind = $mainMod, X, exec, $scriptsDir/Wlogout.sh # Logout
bind = $mainMod, C, exec, $UserScripts/SwitchAudioSink.sh
bind = $mainMod, S, exec, kitty btop
bind = $mainMod, V, exec, WEBKIT_DISABLE_DMABUF_RENDERER=1 openfang-desktop

exec-once = fcitx5 &
exec-once = tixati &
exec-once = udiskie --tray &
exec-once = xdman-beta &
exec-once = $UserScripts/SetMuteNo.sh &
exec-once = systemctl --user start hyprpolkitagent &
exec = gsettings set org.gnome.desktop.interface cursor-theme catppuccin-frappe-red-cursors
bindl = $mainMod, Up, exec, $scriptsDir/Volume.sh --inc
bindl = $mainMod, Down, exec, $scriptsDir/Volume.sh --dec
bindl = $mainMod, Right, exec, $scriptsDir/Volume.sh --inc-precise
bindl = $mainMod, Left, exec, $scriptsDir/Volume.sh --dec-precise
bindld = $mainMod, Z, toggle mic mute, exec, $scriptsDir/Volume.sh --toggle
bind = $mainMod, R, exec, chromium
