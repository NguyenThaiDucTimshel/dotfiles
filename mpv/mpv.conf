#af-toggle=@dynaudnorm:!dynaudnorm=f=500:g=17:r=0.1
#af-toggle=format:srate=48000

### General ###

osc=no
fs=yes
snap-window
save-position-on-quit=yes
watch-later-dir="~~/cache/watch_later"

### OSD ###

border=no
osd-bar=no
osd-bold=yes
osd-font-size=37
osd-font='JetBrains Mono'
