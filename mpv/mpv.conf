### Profile ###

include="~~/profiles.conf"

### Video ###
volume-max=200
volume=140
cache=yes
demuxer-readahead-secs=60
demuxer-seekable-cache=yes
demuxer-max-bytes=1000MiB
video-reversal-buffer=500MiB
audio-reversal-buffer=200MiB
demuxer-max-back-bytes=700MiB
hwdec-extra-frames=256
#demuxer-cache-wait=yes
sub-font='Noto Sans S Chinese Regular'
slang=ja,jp,jpn,jap,Japanese,en,eng,English,en,eng,English
alang=ja,jp,jpn,jap,Japanese,en,eng,English
sub-blur=0.5
sub-font-size=36
sub-color="#FFFFFFFF"
sub-border-color="#FF262626"
sub-border-size=1.5
sub-shadow-offset=1
sub-shadow-color="#33000000"
sub-spacing=0.5
sub-ass-override=force
blend-subtitles

vo=gpu-next
gpu-api=vulkan
hwdec=vulkan
# priority=high 
gpu-context=waylandvk
#hwdec=d3d12va-copy
profile=high-quality   
#d3d11-adapter=NVIDIA  

# hwdec=auto-safe
# vo=gpu-next
# hwdec=auto-copy
# hwdec-codecs=all
#
deband=no
deband-iterations=1
deband-threshold=48
deband-range=16
deband-grain=32

temporal-dither=yes

### Audio and Subtitles ###

# sid=1
sub-auto=fuzzy
sub-fix-timing=yes
audio-channels=auto  
blend-subtitles=yes
sub-ass-override=yes  
audio-file-auto=fuzzy 
audio-pitch-correction=yes
audio-normalize-downmix=yes              
sub-file-paths-append=subtitles
demuxer-mkv-subtitle-preroll=yes
# sub-file-paths=sub;subs;subtitles;Subs
sub-file-paths=**
af=lavfi=[dynaudnorm=g=3:f=250:r=0.9:p=0.9:m=10]

